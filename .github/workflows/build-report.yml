name: Generate watchlist report

# Triggers:
#   1. Daily at 1:00 AM UTC (~9 PM ET previous day, after US close).
#   2. Manually via the "Run workflow" button on the Actions tab.
#   3. On every push to main that touches the analyzer code, so changes
#      go live without waiting for the next scheduled run.
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'quant_watchlist/**'
      - '.github/workflows/build-report.yml'
      - 'requirements.txt'

# Permissions: contents:write so the action can commit the generated
# report back to the repo.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # NumPy pinned below 2.0 for the same reason as the local installer:
          # some transitive deps still ship NumPy 1.x wheels and trigger
          # _ARRAY_API_not_found with NumPy 2.x.
          python -m pip install -r requirements.txt

      - name: Generate report
        # --no-open prevents trying to launch a browser on the headless runner.
        # Including --backtest because that section is meaningful with 18 names
        # in the universe (cross-sectional momentum/mean-reversion need >2 names
        # to produce useful signals).
        run: |
          python -m quant_watchlist --backtest --no-open

      - name: Stage report into docs/
        # GitHub Pages serves from docs/ on main. Copy the report there and
        # write a tiny index.html that redirects bare-domain visits to the
        # report. Both files are committed back to main.
        run: |
          mkdir -p docs
          cp watchlist_output/report.html docs/report.html
          cat > docs/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Quant Watchlist</title>
            <meta http-equiv="refresh" content="0; url=report.html">
            <link rel="canonical" href="report.html">
            <style>
              body { font-family: system-ui, -apple-system, sans-serif;
                     padding: 40px; max-width: 600px; margin: 0 auto;
                     color: #333; line-height: 1.6; }
              a { color: #0366d6; }
            </style>
          </head>
          <body>
            <h1>Quant Watchlist</h1>
            <p>If you're not redirected automatically,
               <a href="report.html">open the latest report</a>.</p>
            <script>window.location.href = 'report.html';</script>
          </body>
          </html>
          HTML

      - name: Commit and push
        # Only commit if the report actually changed. Skipping no-op commits
        # keeps git history clean and avoids spurious diffs.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update report ($(date -u +%Y-%m-%d))"
            git push
          fi
